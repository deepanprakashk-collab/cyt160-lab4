# File: filebeat/filebeat.yml
filebeat.inputs:
- type: log
  enabled: true
  paths:
    - /suricata-logs/eve.json
  json.keys_under_root: true
  json.add_error_key: true

output.elasticsearch:
  hosts: ["172.31.1.144:9200"]
  index: "suricata-alerts-%{+yyyy.MM.dd}"
setup.template.name: "suricata-alerts"
setup.template.pattern: "suricata-alerts-*"

setup.ilm.enabled: false
